{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PeakPrep</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <h1>PeakPrep</h1>
            <h2 style="margin: 8px 0 18px; font-size: 24px; font-weight: 600; letter-spacing: -0.03em;">Smart Study Planner</h2>
            <p class="subtitle">Log in to continue your study journey.</p>
        </div>
        {% if form.errors %}
            <div class="alert alert-error">
                <i class="fa-solid fa-circle-exclamation"></i> Invalid username or password. Please try again.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:13px;">
                Login to Dashboard
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'planner:register' %}">Create one free</a>
        </div>
    </div>
</div>
    <script src="{% static 'js/script.js' %}"></script>
